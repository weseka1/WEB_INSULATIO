# Blueprint de Render — Static Site (Vite build → dist/)
# En Render: New → Blueprint → conectar este repo. Lee este archivo solo.
services:
  - type: web
    name: insulatio-demo
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # SPA: cualquier ruta cae a index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache largo para assets versionados (Vite les pone hash)
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
